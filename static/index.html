<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIN — Sawit AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .sub {
    color: #8b949e;
    font-size: 13px;
    margin-left: auto;
  }
  .header .status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    display: inline-block;
  }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 720px;
    padding: 14px 18px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    animation: fade 0.3s ease;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: #1a6d33;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: #161b22;
    border: 1px solid #21262d;
    border-bottom-left-radius: 4px;
  }
  .msg.bot .sources {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #21262d;
    font-size: 12px;
    color: #8b949e;
  }
  .msg.bot .sources span {
    color: #58a6ff;
  }
  .msg.bot .model-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #1f2937;
    color: #9ca3af;
    margin-bottom: 8px;
  }
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid #21262d;
    flex-shrink: 0;
  }
  .input-wrap {
    display: flex;
    gap: 8px;
    max-width: 760px;
    margin: 0 auto;
  }
  .input-wrap input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #30363d;
    background: #161b22;
    color: #e1e4e8;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }
  .input-wrap input:focus { border-color: #22c55e; }
  .input-wrap input::placeholder { color: #484f58; }
  .input-wrap button {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: #0f1117;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .input-wrap button:hover { background: #16a34a; }
  .input-wrap button:disabled {
    background: #1f2937;
    color: #6b7280;
    cursor: not-allowed;
  }
  .loading {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #8b949e;
    font-size: 13px;
    padding: 10px 0;
  }
  .loading .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    animation: bounce 1.2s infinite;
  }
  .loading .dot:nth-child(2) { animation-delay: 0.2s; }
  .loading .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
  .welcome {
    text-align: center;
    margin: auto;
    color: #484f58;
    max-width: 400px;
  }
  .welcome h2 { font-size: 28px; margin-bottom: 8px; }
  .welcome p { font-size: 14px; line-height: 1.6; }
  .welcome .logo { font-size: 48px; margin-bottom: 16px; }
  .error-msg {
    color: #f85149;
    font-size: 13px;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="header">
  <h1>OPIN</h1>
  <span class="sub"><span class="status"></span> Sawit AI</span>
</div>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="logo">🌴</div>
    <h2>OPIN</h2>
    <p>Tanya apa pun tentang budidaya kelapa sawit.<br>Dijawab berdasarkan 100.000+ dokumen teknis.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="input" placeholder="Tanya tentang sawit..." autofocus>
    <button id="send">Tanya</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');
const welcome = document.getElementById('welcome');

send.addEventListener('click', ask);
input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

async function ask() {
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  welcome?.remove();

  addMsg(q, 'user');
  send.disabled = true;
  input.disabled = true;

  const loader = addLoader();

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    loader.remove();
    addMsg(data.answer || 'Tidak ada jawaban.', 'bot', data.sources || []);
  } catch (e) {
    loader.remove();
    addMsg('Gagal terhubung ke server. Coba lagi.', 'bot', [], true);
  } finally {
    send.disabled = false;
    input.disabled = false;
    input.focus();
  }
}

function addMsg(text, role, sources, isError) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'bot') {
    div.innerHTML = `<div class="model-badge">deepseek-chat</div>` +
      text.replace(/\n/g, '<br>');
    if (sources && sources.length > 0 && !sources[0].includes('Tidak ditemukan')) {
      const s = document.createElement('div');
      s.className = 'sources';
      s.innerHTML = '📚 Sumber: <span>' + sources.join(', ') + '</span>';
      div.appendChild(s);
    }
  } else {
    div.textContent = text;
  }

  if (isError) div.style.borderColor = '#f85149';

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addLoader() {
  const div = document.createElement('div');
  div.className = 'loading';
  div.innerHTML = 'OPIN berpikir <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}
</script>
</body>
</html>
